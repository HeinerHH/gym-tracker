<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GymTracker" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <link rel="icon" type="image/png" href="./icon-192.png" />
  <title>GymTracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; overflow-x: hidden; }
    #root { min-height: 100vh; }
  </style>
  <script type="module" crossorigin src="/gym-tracker/assets/index-BIcoFrdD.js"></script>
</head>
<body>
  <div id="root"><div style="color:#00e5a0;padding:40px;text-align:center;font-family:sans-serif" id="loading-msg">GymTracker lädt...</div></div>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.getElementById('root').innerHTML = '<div style="color:#ff4466;padding:20px;font-family:monospace;font-size:12px;word-break:break-all"><b>Fehler:</b><br>' + msg + '<br>Line: ' + line + '<br>' + (err && err.stack ? err.stack.substring(0,500) : '') + '</div>';
    };
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      });
    }
  </script>
</body>
</html>
